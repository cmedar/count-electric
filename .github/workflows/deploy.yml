name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data_engineering/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get GitHub Actions runner IP
        id: runner-ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Whitelist runner IP on EC2 security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner-ip.outputs.ip }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DATABRICKS_HOST,DATABRICKS_TOKEN,DATABRICKS_HTTP_PATH,DATABRICKS_REPO_PATH,CLOUDFLARE_TUNNEL_TOKEN
          script: |
            # Install Docker + Compose plugin if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl
              sudo install -m 0755 -d /etc/apt/keyrings
              sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              sudo chmod a+r /etc/apt/keyrings/docker.asc
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
            fi

            # Clone or update repo
            if [ ! -d ~/count-electric ]; then
              git clone https://github.com/cmedar/count-electric.git ~/count-electric
            fi
            cd ~/count-electric
            git fetch origin main
            git reset --hard origin/main

            # Prune unused images/build cache before building to avoid disk-full on t2.micro
            sudo docker system prune -af

            # Bring up both services (app + cloudflared) — secrets flow via env vars,
            # nothing is written to disk on the machine.
            sudo --preserve-env=DATABRICKS_HOST,DATABRICKS_TOKEN,DATABRICKS_HTTP_PATH,DATABRICKS_REPO_PATH,CLOUDFLARE_TUNNEL_TOKEN \
              docker compose up -d --build
            echo "Deployment complete."
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_REPO_PATH: ${{ secrets.DATABRICKS_REPO_PATH }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

      - name: Sync Databricks Git Folder
        run: |
          DATABRICKS_URL="${{ secrets.DATABRICKS_HOST }}/api/2.0/repos/${{ secrets.DATABRICKS_REPO_ID }}"
          echo "Syncing to: ${DATABRICKS_URL//${{ secrets.DATABRICKS_HOST }}/DATABRICKS_HOST}"
          curl --fail -X PATCH \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}' \
            "$DATABRICKS_URL"
          echo "Databricks sync triggered."

      - name: Remove runner IP from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner-ip.outputs.ip }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
