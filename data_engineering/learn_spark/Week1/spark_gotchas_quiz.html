<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark Gotchas Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 1.5rem; max-width: 720px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .progress-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #1a56db; border-radius: 2px; transition: width 0.3s; }
  .meta { display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
  .meta span { font-size: 13px; color: #888; }
  .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: #FAEEDA; color: #633806; margin-bottom: 0.75rem; }
  .question { font-size: 15px; font-weight: 500; margin-bottom: 1rem; line-height: 1.55; }
  pre { background: #f5f5f5; border-radius: 6px; padding: 10px 14px; font-size: 12px; margin-bottom: 1rem; overflow-x: auto; line-height: 1.6; color: #222; }
  .opt-btn { width: 100%; text-align: left; padding: 10px 14px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; font-family: inherit; line-height: 1.4; }
  .opt-btn:hover { background: #f5f5f5; }
  .opt-btn.correct { background: #ecfdf5 !important; border-color: #6ee7b7 !important; color: #065f46 !important; pointer-events: none; }
  .opt-btn.wrong { background: #fef2f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; pointer-events: none; }
  .opt-btn.locked { pointer-events: none; }
  .exp { padding: 10px 14px; border-left: 3px solid #93b4f8; font-size: 13px; color: #444; margin-top: 1rem; line-height: 1.65; background: #f8faff; border-radius: 0 6px 6px 0; }
  .exp code { background: #e8f0fe; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .nav { margin-top: 1rem; display: flex; align-items: center; gap: 10px; }
  .nav-btn { padding: 7px 16px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 13px; font-family: inherit; }
  .nav-btn:hover { background: #f5f5f5; }
  .score-screen { text-align: center; padding: 2rem 0; }
  .score-big { font-size: 48px; font-weight: 600; color: #1a1a1a; }
  .score-label { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.5rem; }
  .score-breakdown { text-align: left; max-width: 400px; margin: 0 auto 1.5rem; }
  .score-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eee; }
  .score-row:last-child { border-bottom: none; }
  .correct-dot { color: #065f46; font-weight: 600; }
  .wrong-dot { color: #991b1b; font-weight: 600; }
</style>
</head>
<body>
<h1>Spark operations — caveats &amp; gotchas</h1>
<p class="subtitle">Day 4 + Day 5 · 10 questions</p>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div id="quiz-area"></div>

<script>
const questions = [
  {
    tag: "Day 4 · when/otherwise",
    q: "What does this return for a row where amount = 500?",
    code: `df.withColumn("category",\n  when(col("amount") > 10000, "high")\n)`,
    opts: ["\"low\"", "\"high\"", "null", "An error is thrown"],
    ans: 2,
    exp: "Missing <code>otherwise()</code> means all unmatched rows silently become null. No error, no warning. Always add <code>.otherwise(\"default\")</code> unless you explicitly want nulls."
  },
  {
    tag: "Day 4 · cast",
    q: "You cast a string column containing \"abc\" to IntegerType. What value does Spark store?",
    code: `df.withColumn("amount_int", col("amount_str").cast("integer"))`,
    opts: ["0", "null", "Throws AnalysisException", "Throws RuntimeException"],
    ans: 1,
    exp: "Cast failures are silent. Spark stores null and moves on. No exception, no warning. This is one of the most common sources of silent data corruption in pipelines."
  },
  {
    tag: "Day 4 · col() in joins",
    q: "You join two DataFrames both having a column called 'id'. Which column reference is safest inside the join condition?",
    opts: [
      "df.id",
      "\"id\" as a plain string",
      "col(\"id\") — it's always unambiguous",
      "They all behave the same"
    ],
    ans: 0,
    exp: "When two DataFrames share column names, <code>df1[\"id\"]</code> or <code>df2[\"id\"]</code> (bracket notation on the specific DataFrame) is the safest — it explicitly scopes to one DataFrame. <code>col(\"id\")</code> can be ambiguous in joins. Plain string shorthand is the most dangerous."
  },
  {
    tag: "Day 5 · & | ~ precedence",
    q: "What is wrong with this filter?",
    code: `df.filter(col("amount") > 1000 | col("country") == "NL")`,
    opts: [
      "Should use 'or' instead of |",
      "Python evaluates | before > and ==, producing wrong results silently",
      "filter() doesn't support | operator",
      "Nothing is wrong"
    ],
    ans: 1,
    exp: "Python operator precedence: <code>|</code> binds tighter than <code>></code> and <code>==</code>. The expression parses incorrectly. Always wrap each condition in parentheses: <code>(col(\"amount\") > 1000) | (col(\"country\") == \"NL\")</code>."
  },
  {
    tag: "Day 5 · null filtering",
    q: "Your transactions table has some rows where amount is null. How many rows does this filter return?",
    code: `df.filter(col("amount") > 1000)`,
    opts: [
      "Rows where amount > 1000, plus rows where amount is null",
      "Only rows where amount > 1000 — null rows are silently excluded",
      "Throws NullPointerException",
      "All rows — null is treated as 0"
    ],
    ans: 1,
    exp: "Null comparisons always return null in Spark SQL, which is treated as false by filter(). Null rows silently disappear. If you need them: <code>filter((col(\"amount\") > 1000) | col(\"amount\").isNull())</code>."
  },
  {
    tag: "Day 5 · distinct vs dropDuplicates",
    q: "You have a transactions table. customer_A appears in 3 rows with different amounts. What does each return?",
    opts: [
      "Both return 1 row for customer_A",
      "distinct() returns 3 rows, dropDuplicates(['customer_id']) returns 1",
      "distinct() returns 1 row, dropDuplicates(['customer_id']) returns 1",
      "dropDuplicates() throws if there are duplicate values"
    ],
    ans: 1,
    exp: "<code>distinct()</code> compares all columns — 3 rows with different amounts are all distinct. <code>dropDuplicates(['customer_id'])</code> only looks at customer_id and keeps the first occurrence, returning 1 row per customer."
  },
  {
    tag: "Day 5 · fillna",
    q: "You call df.fillna(0) on a DataFrame with both integer and string columns. What happens to the string nulls?",
    opts: [
      "String nulls are filled with \"0\"",
      "String nulls are silently skipped — fillna(0) only affects numeric columns",
      "Throws a type mismatch error",
      "All nulls including strings are filled with 0"
    ],
    ans: 1,
    exp: "<code>fillna()</code> is type-sensitive. <code>fillna(0)</code> only fills numeric columns. String nulls remain null. Use <code>fillna(0, subset=[\"amount\", \"fee\"])</code> to be explicit and avoid surprises."
  },
  {
    tag: "Day 5 · orderBy cost",
    q: "You call orderBy('amount') on your 120 GB transactions table. What kind of transformation is this?",
    opts: [
      "Narrow — each partition sorts independently",
      "Wide — requires a global shuffle to produce a fully sorted output",
      "It depends on the number of partitions",
      "It is an action, not a transformation"
    ],
    ans: 1,
    exp: "orderBy() is wide — it needs to see all rows to determine global order, which requires a shuffle. On 120 GB this is expensive. For top-N results, use <code>orderBy(col(\"amount\").desc()).limit(10)</code> — Spark optimises this combination to avoid sorting the full dataset."
  },
  {
    tag: "Day 5 · sample()",
    q: "You call df.sample(fraction=0.1) on a 1 million row table. How many rows do you get back?",
    opts: [
      "Exactly 100,000",
      "Approximately 100,000 — could be 97K or 103K",
      "At most 100,000 — never more",
      "Exactly 100,000 with a fixed seed"
    ],
    ans: 1,
    exp: "<code>sample()</code> is probabilistic — each row is independently included with the given probability. The result is approximate. For exactly n rows use <code>df.limit(n)</code>. A fixed <code>seed</code> makes it reproducible but still approximate in size."
  },
  {
    tag: "Day 4 · expr()",
    q: "Which of these correctly uses expr() to compute days since a transaction?",
    opts: [
      "df.withColumn(\"days_old\", expr(datediff(current_date(), txn_date)))",
      "df.withColumn(\"days_old\", expr(\"datediff(current_date(), txn_date)\"))",
      "df.withColumn(\"days_old\", datediff(expr(\"current_date()\"), col(\"txn_date\")))",
      "expr() cannot be used inside withColumn()"
    ],
    ans: 1,
    exp: "<code>expr()</code> takes a SQL string — the expression goes inside quotes. This is one of its main advantages: you can write full SQL including functions, CASE WHEN, and date arithmetic without hunting for the equivalent DataFrame API method."
  }
];

let cur = 0;
const results = new Array(questions.length).fill(null);

function updateProgress() {
  const pct = (cur / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function renderQuestion() {
  const q = questions[cur];
  updateProgress();
  let html =
    '<div class="meta"><span class="tag">' + q.tag + '</span><span style="font-size:13px;color:#888">' + (cur+1) + ' / ' + questions.length + '</span></div>' +
    '<p class="question">' + q.q + '</p>';
  if (q.code) html += '<pre>' + q.code + '</pre>';
  html += '<div id="opts-wrap"></div><div id="exp-wrap"></div><div id="nav-wrap" class="nav"></div>';
  document.getElementById('quiz-area').innerHTML = html;

  const wrap = document.getElementById('opts-wrap');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(i));
    wrap.appendChild(btn);
  });
}

function handleAnswer(chosen) {
  const q = questions[cur];
  results[cur] = chosen === q.ans;
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.add('locked');
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  document.getElementById('exp-wrap').innerHTML = '<div class="exp">' + q.exp + '</div>';
  const nav = document.getElementById('nav-wrap');
  if (cur < questions.length - 1) {
    const nb = document.createElement('button');
    nb.className = 'nav-btn';
    nb.textContent = 'Next →';
    nb.addEventListener('click', () => { cur++; renderQuestion(); });
    nav.appendChild(nb);
  } else {
    const nb = document.createElement('button');
    nb.className = 'nav-btn';
    nb.textContent = 'See results →';
    nb.addEventListener('click', () => renderScore());
    nav.appendChild(nb);
  }
}

function renderScore() {
  document.getElementById('progress-bar').style.width = '100%';
  const correct = results.filter(Boolean).length;
  let breakdown = '';
  questions.forEach((q, i) => {
    const ok = results[i];
    breakdown += '<div class="score-row"><span>' + q.tag + '</span><span class="' + (ok ? 'correct-dot' : 'wrong-dot') + '">' + (ok ? '✓' : '✗') + '</span></div>';
  });
  document.getElementById('quiz-area').innerHTML =
    '<div class="score-screen">' +
    '<div class="score-big">' + correct + '/' + questions.length + '</div>' +
    '<div class="score-label">gotchas caught</div>' +
    '<div class="score-breakdown">' + breakdown + '</div>' +
    '<button class="nav-btn" onclick="restart()">Retry all</button>' +
    '</div>';
}

function restart() {
  cur = 0;
  results.fill(null);
  document.getElementById('progress-bar').style.width = '0%';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
