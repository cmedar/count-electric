<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark Day 7 Quiz — Reading & Writing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 1.5rem; max-width: 720px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .progress-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #1a56db; border-radius: 2px; transition: width 0.3s; }
  .meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
  .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: #EEEDFE; color: #3C3489; }
  .question { font-size: 15px; font-weight: 500; margin-bottom: 1rem; line-height: 1.55; }
  pre { background: #f5f5f5; border-radius: 6px; padding: 10px 14px; font-size: 12px; margin-bottom: 1rem; overflow-x: auto; line-height: 1.7; color: #222; white-space: pre-wrap; }
  .opt-btn { width: 100%; text-align: left; padding: 10px 14px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; font-family: inherit; line-height: 1.4; }
  .opt-btn:hover { background: #f5f5f5; }
  .opt-btn.correct { background: #ecfdf5 !important; border-color: #6ee7b7 !important; color: #065f46 !important; pointer-events: none; }
  .opt-btn.wrong { background: #fef2f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; pointer-events: none; }
  .opt-btn.locked { pointer-events: none; }
  .exp { padding: 10px 14px; border-left: 3px solid #93b4f8; font-size: 13px; color: #444; margin-top: 1rem; line-height: 1.65; background: #f8faff; border-radius: 0 6px 6px 0; }
  .exp code { background: #e8f0fe; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .nav { margin-top: 1rem; display: flex; align-items: center; gap: 10px; }
  .nav-btn { padding: 7px 16px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 13px; font-family: inherit; }
  .nav-btn:hover { background: #f5f5f5; }
  .score-screen { text-align: center; padding: 2rem 0; }
  .score-big { font-size: 48px; font-weight: 600; color: #1a1a1a; }
  .score-label { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.5rem; }
  .score-breakdown { text-align: left; max-width: 460px; margin: 0 auto 1.5rem; }
  .score-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eee; gap: 12px; }
  .score-row:last-child { border-bottom: none; }
  .correct-dot { color: #065f46; font-weight: 600; flex-shrink: 0; }
  .wrong-dot { color: #991b1b; font-weight: 600; flex-shrink: 0; }
</style>
</head>
<body>
<h1>Reading &amp; writing data</h1>
<p class="subtitle">Day 7 · 12 questions · schema, formats, write modes, coalesce vs repartition</p>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div id="quiz-area"></div>

<script>
const questions = [
  {
    tag: "inferSchema",
    q: "Why should you avoid inferSchema=true in a production pipeline reading a 120 GB file?",
    opts: [
      "It only works on CSV, not Parquet or JSON",
      "It requires a full extra scan of the data to guess types — doubles read cost",
      "It always infers everything as StringType",
      "It is not supported in Spark 3.x"
    ],
    ans: 1,
    exp: "inferSchema does a full pass over the data before reading it — effectively reading the file twice. On large files this is expensive. Always define schema explicitly with StructType in production. inferSchema is fine for exploration in notebooks."
  },
  {
    tag: "Schema — StructType",
    q: "What is the Spark equivalent of Oracle's CREATE TABLE with column definitions?",
    opts: [
      "df.printSchema()",
      "spark.catalog.createTable()",
      "StructType with StructField entries",
      "spark.read.schema()"
    ],
    ans: 2,
    exp: "StructType + StructField is how you define column names, types, and nullability upfront — exactly like a CREATE TABLE DDL in Oracle. <code>printSchema()</code> is the equivalent of Oracle's DESC — it shows the structure, it doesn't define it."
  },
  {
    tag: "Schema — nullable",
    q: "What is the Spark equivalent of Oracle's NOT NULL constraint?",
    code: `StructField("customer_id", StringType(), nullable=?)`,
    opts: [
      "nullable=True",
      "nullable=False",
      "nullable=None",
      "There is no equivalent — Spark doesn't enforce nullability"
    ],
    ans: 1,
    exp: "nullable=False is the direct equivalent of NOT NULL in Oracle. nullable=True (the default) means the column accepts nulls. Important caveat: Spark does not enforce nullability at runtime — it is metadata only. Oracle would reject a null insert; Spark just records the intent."
  },
  {
    tag: "Corrupt records",
    q: "You read a CSV with mode PERMISSIVE (default). A row has the wrong number of columns. What happens?",
    opts: [
      "Spark throws an exception and stops",
      "The row is silently dropped",
      "The row is kept and the raw content is placed in a _corrupt_record column",
      "The row is filled with nulls for missing columns"
    ],
    ans: 2,
    exp: "PERMISSIVE keeps bad rows and puts the raw string in a special <code>_corrupt_record</code> column. DROPMALFORMED silently drops them. FAILFAST throws immediately. In banking pipelines FAILFAST or DROPMALFORMED with logging is safer — PERMISSIVE can hide data quality problems."
  },
  {
    tag: "Write modes",
    q: "You run df.write.parquet('s3://output/') twice without specifying a mode. What happens on the second run?",
    opts: [
      "The data is appended to the existing files",
      "The existing data is overwritten",
      "Spark throws an error — the default mode is error",
      "Spark skips the write silently"
    ],
    ans: 2,
    exp: "The default write mode is <code>error</code> (also called errorifexists). If the path already has data, Spark throws AnalysisException. This is a deliberate fail-safe. Always specify <code>.mode('overwrite')</code> or <code>.mode('append')</code> explicitly in production."
  },
  {
    tag: "Write modes",
    q: "You want to add new daily transactions to an existing Parquet dataset without touching historical data. Which mode?",
    opts: ["overwrite", "append", "ignore", "error"],
    ans: 1,
    exp: "<code>append</code> adds new files alongside existing ones — no existing data is touched or read. <code>overwrite</code> would delete the entire historical dataset first. This is the standard pattern for incremental loads in data pipelines."
  },
  {
    tag: "Write modes",
    q: "You use mode ignore and the output path already exists. What happens?",
    opts: [
      "Existing data is deleted and replaced",
      "New data is appended",
      "Nothing happens — the write is skipped silently and Spark reports success",
      "Spark throws a warning but writes anyway"
    ],
    ans: 2,
    exp: "<code>ignore</code> is idempotent — if the path exists, do nothing and succeed. Useful for first-time initialisation jobs where you never want to overwrite if data already landed. Dangerous if you expect the write to always happen — it will silently skip."
  },
  {
    tag: "coalesce vs repartition",
    q: "You have 200 partitions after a groupBy and want to write 8 output files to S3 as cheaply as possible. Which do you use?",
    opts: [
      "repartition(8) — always produces balanced output",
      "coalesce(8) — merges local partitions with no shuffle",
      "partitionBy(8) — controls output file count",
      "repartition(8, col('origin')) — routes by key"
    ],
    ans: 1,
    exp: "<code>coalesce(8)</code> merges existing partitions on the same Executor with no network movement — much cheaper than repartition. The output may be slightly uneven in size but that rarely matters for S3 writes. Use repartition only when you need perfectly balanced partitions."
  },
  {
    tag: "coalesce vs repartition",
    q: "You currently have 4 partitions and call coalesce(10). How many partitions do you get?",
    opts: [
      "10 — coalesce always sets the exact count",
      "4 — coalesce cannot increase partitions",
      "8 — coalesce doubles the count",
      "Throws an error"
    ],
    ans: 1,
    exp: "coalesce can only reduce partitions — it works by merging, not splitting. To increase partitions you must use repartition(), which does a full shuffle and can go up or down. This is a classic exam trap."
  },
  {
    tag: "repartition by column",
    q: "What does repartition(4, col('origin')) guarantee that repartition(4) does not?",
    opts: [
      "Exactly 4 output files on S3",
      "All rows with the same origin value land in the same partition",
      "Partitions are sorted by origin",
      "No shuffle is performed"
    ],
    ans: 1,
    exp: "repartition by column uses hash partitioning on that column — same key, same partition, every time. This is the manual equivalent of what groupBy does automatically. repartition(4) without a column distributes rows randomly (round-robin). Both do a full shuffle."
  },
  {
    tag: "partitionBy on write",
    q: "You write a 120 GB transactions table with partitionBy('txn_date'). A future query filters WHERE txn_date = '2024-03-15'. What does Spark do?",
    opts: [
      "Reads the full 120 GB then filters in memory",
      "Uses partition pruning — reads only the txn_date=2024-03-15 directory",
      "Throws an error — partitioned columns cannot be used in WHERE",
      "Reads two adjacent partitions for safety"
    ],
    ans: 1,
    exp: "Partition pruning — Spark reads the S3 directory listing, sees <code>txn_date=2024-03-15/</code>, and fetches only that directory. All other dates are never touched. On a year of daily data that means reading 1/365th of the total. This is one of the biggest performance wins in data engineering."
  },
  {
    tag: "partitionBy — cardinality",
    q: "You write a customer transactions table with partitionBy('customer_id'). There are 5 million unique customers. What is the problem?",
    opts: [
      "Spark cannot partition by string columns",
      "5 million tiny directories on S3 — listing overhead kills read performance",
      "partitionBy only supports up to 1000 unique values",
      "The data will not be evenly distributed"
    ],
    ans: 1,
    exp: "partitionBy on a high-cardinality column creates one directory per unique value. 5 million S3 directories means massive overhead just listing them before reading anything. partitionBy works best on low-cardinality columns: date, country, status, category — things with tens or hundreds of distinct values, not millions."
  }
];

let cur = 0;
const results = new Array(questions.length).fill(null);

function updateProgress() {
  document.getElementById('progress-bar').style.width = ((cur / questions.length) * 100) + '%';
}

function renderQuestion() {
  updateProgress();
  const q = questions[cur];
  let html =
    '<div class="meta"><span class="tag">' + q.tag + '</span><span style="font-size:13px;color:#888">' + (cur+1) + ' / ' + questions.length + '</span></div>' +
    '<p class="question">' + q.q + '</p>';
  if (q.code) html += '<pre>' + q.code + '</pre>';
  html += '<div id="opts-wrap"></div><div id="exp-wrap"></div><div id="nav-wrap" class="nav"></div>';
  document.getElementById('quiz-area').innerHTML = html;

  const wrap = document.getElementById('opts-wrap');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(i));
    wrap.appendChild(btn);
  });
}

function handleAnswer(chosen) {
  const q = questions[cur];
  results[cur] = chosen === q.ans;
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.add('locked');
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  document.getElementById('exp-wrap').innerHTML = '<div class="exp">' + q.exp + '</div>';
  const nav = document.getElementById('nav-wrap');
  const nb = document.createElement('button');
  nb.className = 'nav-btn';
  if (cur < questions.length - 1) {
    nb.textContent = 'Next →';
    nb.addEventListener('click', () => { cur++; renderQuestion(); });
  } else {
    nb.textContent = 'See results →';
    nb.addEventListener('click', () => renderScore());
  }
  nav.appendChild(nb);
}

function renderScore() {
  document.getElementById('progress-bar').style.width = '100%';
  const correct = results.filter(Boolean).length;
  const verdict = correct >= 10 ? 'Exam-ready on this topic 🎯' : correct >= 7 ? 'Solid — review the misses' : 'Worth another pass before the exam';
  let breakdown = '';
  questions.forEach((q, i) => {
    breakdown += '<div class="score-row"><span>' + q.tag + '</span><span class="' + (results[i] ? 'correct-dot' : 'wrong-dot') + '">' + (results[i] ? '✓' : '✗') + '</span></div>';
  });
  document.getElementById('quiz-area').innerHTML =
    '<div class="score-screen">' +
    '<div class="score-big">' + correct + '/' + questions.length + '</div>' +
    '<div class="score-label">' + verdict + '</div>' +
    '<div class="score-breakdown">' + breakdown + '</div>' +
    '<button class="nav-btn" onclick="restart()">Retry all</button>' +
    '</div>';
}

function restart() {
  cur = 0;
  results.fill(null);
  updateProgress();
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
