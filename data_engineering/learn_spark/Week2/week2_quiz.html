<script>
const decks = {

  cert: {

      {
        id:"agg", label:"Aggregations",
        questions:[
          { q:"You call df.groupBy('dept').agg(collect_list('name'), collect_set('name')). Both columns contain the same source data. What is the difference in the results?",
            opts:[
              "collect_list and collect_set are identical — both deduplicate values",
              "collect_list preserves duplicates and order; collect_set deduplicates (order not guaranteed)",
              "collect_set preserves order; collect_list does not",
              "collect_list returns a sorted array; collect_set returns an unsorted array"

            ans:1,
            exp:"<strong>B.</strong> <code>collect_list</code> gathers all values including duplicates, preserving insertion order. <code>collect_set</code> deduplicates and the resulting order is undefined. Use <code>collect_set</code> when you need unique values; <code>collect_list</code> when duplicates matter." },
          { q:"What is the output of rollup('region', 'dept') compared to groupBy('region', 'dept')?",

          { q:"You call pivot('country') without specifying a values list on a DataFrame with 10 million rows and 50 distinct countries. What is the performance concern?",
            opts:[
              "pivot() cannot handle more than 100 distinct values",
              "Spark must scan the entire column to discover all distinct values before pivoting — expensive on large data",
              "pivot() requires a sort, adding a wide transformation",

            ],
            ans:1,
            exp:"<strong>B.</strong> Without a values list, Spark performs a full scan of the pivot column to discover distinct values before executing the pivot. On large data this is expensive. Pass the list explicitly: <code>pivot('country', ['NL','DE','RO'])</code> to skip the scan." },
          { q:"Which SQL keyword converts a table from long format (many rows, few columns) to wide format (fewer rows, many columns)?",
            opts:["PIVOT","CONVERT","WHERE","TRANSFORM","SUM"],
            ans:0,
            exp:"<strong>A.</strong> The <code>PIVOT</code> clause rotates rows into columns: distinct values in one column become new column headers, with an aggregate (e.g. SUM) filling each cell. This is the standard long-to-wide transformation. CONVERT changes data types; WHERE filters rows; TRANSFORM applies a function to array elements; SUM is an aggregate, not a reshaping keyword." },
          { q:"You need to count distinct values across a billion-row column. An exact count is not required — a close approximation is acceptable. Which function provides the best performance?",
            opts:["count(distinct col(\'id\'))","countDistinct(col(\'id\'))","approx_count_distinct(col(\'id\'))","size(collect_set(col(\'id\')))"],
            code:true,
            ans:2,
            exp:"<strong>C.</strong> <code>approx_count_distinct()</code> uses the HyperLogLog++ algorithm to estimate distinct counts with configurable relative error (default ~5%). It processes data in a single pass without shuffling all values to one partition. <code>countDistinct()</code> requires a full shuffle. <code>collect_set()</code> collects all values to the driver — dangerous on large datasets." },
          { q:"A DataFrame has columns 'product' and 'revenue'. Which code correctly computes each product's total revenue, average revenue, and transaction count (with pyspark.sql.functions imported as F)?",
            opts:[
              "df.select(\'product\',\'revenue\').groupby(\'product\').agg(F.sum(\'revenue\'), F.alias(\'total_revenue\'), F.mean(\'revenue\').alias(\'transaction_count\'))",
              "df.groupby(\'product\').agg(sum(\'revenue\'), avg(\'revenue\'), count(\'revenue\'))",
              "df.select(\'product\',\'revenue\').groupby(\'product\').agg(F.sum(\'revenue\'), F.mean(\'revenue\'), F.count(\'revenue\'))",
              "df.groupby(\'product\').agg(F.sum(\'revenue\'), F.mean(\'revenue\'), F.count(\'count\'))"

            code:true,
            ans:2,
            exp:"<strong>C.</strong> Option C correctly chains <code>groupby('product').agg()</code> with <code>F.sum</code>, <code>F.mean</code>, and <code>F.count</code> all applied to 'revenue'. Option A calls <code>F.alias()</code> on the module (not on a column). Option B uses <code>sum/avg/count</code> without importing them from F. Option D calls <code>F.count('count')</code> referencing a non-existent column." },
          { q:"A DataFrame has an array column 'skills'. Some rows have empty arrays [] and some have null. You want to flatten arrays into individual rows but must keep rows with empty/null arrays as a single null row. Which function should you use?",
            opts:["explode(col(\'skills\'))","array_contains(col(\'skills\'), \'sql\')","flatten(col(\'skills\'))","explode_outer(col(\'skills\'))"],
            code:true,
            ans:3,
            exp:"<strong>D.</strong> <code>explode()</code> drops rows where the array is empty or null. <code>explode_outer()</code> preserves such rows, emitting a single row with null — the LEFT OUTER equivalent of explode. Critical when auditing records with missing array data. <code>array_contains</code> checks membership; <code>flatten</code> merges nested arrays without exploding." }
        ]
      },
      {
        id:"win", label:"Window Functions",
        questions:[
          { q:"Three transactions all have amount = 5000. A window is ordered by amount DESC. What does each function return for these tied rows?",
            opts:[
              "rank=1,1,1 · dense_rank=1,1,1 · row_number=1,1,1",
              "rank=1,1,3 · dense_rank=1,1,2 · row_number=1,2,3",
              "rank=1,2,3 · dense_rank=1,1,2 · row_number=1,1,1",
              "rank=1,1,3 · dense_rank=1,1,1 · row_number=1,2,3"
            ],
            ans:1,
            exp:"<strong>B.</strong> For three tied rows: <code>rank()</code> assigns 1,1,3 — tied rows share the same rank but the next rank skips. <code>dense_rank()</code> assigns 1,1,2 — no gaps. <code>row_number()</code> assigns 1,2,3 — always unique, arbitrary tiebreak." },
          { q:"You write SUM(amount) OVER (PARTITION BY customer_id ORDER BY txn_date). What does adding ORDER BY change compared to omitting it?",
            opts:[
              "Nothing — ORDER BY inside OVER is ignored for aggregates",
              "With ORDER BY: running cumulative sum up to the current row. Without ORDER BY: total sum for the whole partition on every row",
              "With ORDER BY: Spark sorts the output DataFrame. Without ORDER BY: output is unsorted",
              "ORDER BY inside OVER is only valid for ranking functions, not aggregates"
            ],
            ans:1,
            exp:"<strong>B.</strong> With <code>ORDER BY</code> the default window frame is RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW — giving a running total. Without <code>ORDER BY</code> the frame expands to the whole partition — every row gets the same total. This is one of the most common window function exam traps." },
          { q:"Which window function returns the value from 2 rows ahead of the current row within a partition?",
            opts:["lag(col, 2)","lead(col, 2)","first_value(col, 2)","nth_value(col, 2)"],
            ans:1,
            exp:"<strong>B.</strong> <code>lead(col, n)</code> looks <em>forward</em> n rows. <code>lag(col, n)</code> looks <em>backward</em> n rows. <code>first_value</code> returns the first value in the window frame. <code>nth_value</code> returns the nth value — but lead/lag are the go-to for row-offset navigation." }
        ]
      },
      {
        id:"joins", label:"Joins",
        questions:[
          { q:"You LEFT SEMI JOIN transactions to a VIP customers list. What does the result contain?",
            opts:[
              "All columns from both tables, for matching rows only",
              "Only left-table columns, for rows that have a match in the right table",
              "Only left-table columns, for rows that do NOT have a match in the right table",
              "All rows from the left table, with null-filled right columns for non-matches"
            ],
            ans:1,
            exp:"<strong>B.</strong> A LEFT SEMI JOIN is the SQL equivalent of EXISTS — it filters the left table to only rows that have a match, but returns <em>only the left-table columns</em>. The right table contributes no columns to the output. This is different from an INNER JOIN which returns columns from both sides." },
          { q:"You LEFT ANTI JOIN transactions to a blacklist table. What does the result contain?",
            opts:[
              "Rows from transactions that appear in the blacklist",
              "Rows from transactions that do NOT appear in the blacklist",
              "All rows from both tables with a flag column",
              "Rows from the blacklist that have no match in transactions"
            ],
            ans:1,
            exp:"<strong>B.</strong> LEFT ANTI JOIN is the SQL equivalent of NOT EXISTS — it keeps only rows from the left table that have <em>no</em> match in the right table. Use it to find orphaned records, unprocessed items, or rows missing from a reference set." },
          { q:"Two DataFrames share a column named 'id'. Which join syntax avoids creating a duplicate 'id' column in the result?",
            opts:[
              "df1.join(df2, df1.id == df2.id)",
              "df1.join(df2, \"id\")",
              "df1.join(df2, [\"id\"])",
              "Both B and C avoid duplication"
            ],
            ans:3,
            exp:"<strong>D.</strong> Passing the join column as a string (<code>\"id\"</code>) or a list (<code>[\"id\"]</code>) tells Spark to treat it as a shared key — the result contains only one 'id' column. Passing a condition (<code>df1.id == df2.id</code>) treats them as independent columns — both are kept, causing ambiguity on downstream references." },
          { q:"A null key in the left table never matches any row in the right table during a join. Which join type would you use to explicitly include those null-key rows in the result?",
            opts:[
              "INNER JOIN with a null check in the WHERE clause",
              "LEFT JOIN — unmatched left rows including null-key rows are kept with nulls in right columns",
              "FULL OUTER JOIN — null keys are placed in a special null partition",
              "Use eqNullSafe (<=>) in the join condition to match nulls"
            ],
            ans:1,
            exp:"<strong>B.</strong> In a LEFT JOIN, all left rows are kept regardless of whether they match — including rows where the key is null. The right columns are null for unmatched rows. Option D (<code>eqNullSafe</code>) would actually match null-to-null, which is usually not desired in joins." },
          { q:"A LEFT JOIN is run between a sales table (left) and favorite_stores table (right) on customer_id. Sales has rows for IDs 44, 23, 42. favorite_stores has matches for 44 → s1 and 42 → s2, but no row for ID 23. What does the result contain?",

            ans:2,

        ]

      {
        id:"delta", label:"Delta Lake",
        questions:[
          { q:"A Delta table is at version 15. A colleague accidentally overwrites it. How do you restore it?",
            opts:[

            ans:1,
            exp:"<strong>B.</strong> <code>RESTORE TABLE my_table TO VERSION AS OF 14</code> rolls the table back to a previous version in one command — no manual rewrite needed. This is one of Delta Lake's core capabilities. Time travel also works with <code>TIMESTAMP AS OF '2024-03-15'</code>." },
          { q:"What is the difference between OPTIMIZE and VACUUM on a Delta table?",
            opts:[
              "OPTIMIZE removes old file versions; VACUUM compacts small files",

            ans:1,
            exp:"<strong>B.</strong> <code>OPTIMIZE</code> compacts many small Parquet files into fewer larger files — reduces S3 listing overhead and improves scan performance. <code>VACUUM</code> physically deletes data files that are no longer referenced by the transaction log and are older than the retention threshold (default 7 days)." },
          { q:"You run VACUUM my_table RETAIN 0 HOURS. What is required before this command will execute?",
            opts:[
              "The table must be empty",

            ],

            exp:"<strong>C.</strong> Delta prevents accidental data loss by blocking VACUUM with retention below 7 days unless you explicitly disable the safety check. After disabling: <code>VACUUM my_table RETAIN 0 HOURS</code> removes all old file versions, making time travel to any previous version impossible." },
          { q:"You run OPTIMIZE my_table ZORDER BY (country). A query filters WHERE country = 'NL'. What benefit does Z-ordering provide?",
            opts:[
              "It sorts the table rows alphabetically by country",

              "It partitions the data by country, creating separate directories"

            ans:1,
            exp:"<strong>B.</strong> Z-ordering co-locates data with similar values in the same files. Combined with Delta's file statistics, the query planner can skip files that don't contain 'NL' without reading them. This is <em>data skipping</em> — not a traditional index and not the same as <code>partitionBy</code>." },
          { q:"Which command shows the full change history of a Delta table including who ran each operation and when?",

        ]

          { q:"Which storage level should you use when your cached DataFrame is too large to fit in Executor memory but you still need reasonable performance?",

          { q:"A data engineer wrote a PySpark UDF that reads from a global list to look up values. A colleague warns this approach is problematic. Which statement best describes the best practice for UDFs in Spark?",
            opts:[
              "UDFs can safely read and write to global mutable state shared across tasks",
              "UDFs should always return complex types such as structs or maps",

// ── Deck switching ──────────────────────────────────────────────────────────
function switchDeck(id) {
  activeDeck = id;
  activeTopic = null; activeQ = 0; answered = false;
  initTotals();
  document.getElementById('progress').style.width = '0%';
  document.getElementById('header-sub').textContent = decks[id].headerSub;
  document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('deck-' + id).classList.add('active');
  document.getElementById('check-results-wrap').style.display = id === 'daily' ? 'block' : 'none';
  renderAll();
}

// ── Progress ────────────────────────────────────────────────────────────────
function totalAnswered() {
  return Object.values(totals).reduce((s,t) => s + t.seen, 0);
}
function totalQuestions() {
  return decks[activeDeck].topics.reduce((s,t) => s + t.questions.length, 0);
}
function updateProgress() {
  const pct = (totalAnswered() / totalQuestions()) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

// ── Topic bar ───────────────────────────────────────────────────────────────
function renderTopicBar() {
  const bar = document.getElementById('topic-bar');
  bar.innerHTML = '';
  const topics = decks[activeDeck].topics;
  if (topics.length === 0) {
    bar.innerHTML = '<span style="font-size:13px;color:#aaa">Daily questions will appear here as days are added.</span>';
    return;
  }
  let lastDay = null;
  topics.forEach(t => {
    if (t.day && t.day !== lastDay) {
      if (lastDay !== null) {
        const div = document.createElement('span');
        div.className = 'day-divider';
        bar.appendChild(div);
      }
      const lbl = document.createElement('span');
      lbl.className = 'day-label';
      lbl.textContent = t.day;
      bar.appendChild(lbl);
      lastDay = t.day;
    }
    const st = totals[t.id];
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (activeTopic === t.id ? ' active' : '');
    const score = st.seen > 0 ? `<span class="badge">${st.correct}/${st.total}</span>` : '';
    btn.innerHTML = t.label + score;
    btn.addEventListener('click', () => {
      activeTopic = t.id; activeQ = 0; answered = false; renderAll();
    });
    bar.appendChild(btn);
  });
}

// ── Question ────────────────────────────────────────────────────────────────
function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (!activeTopic) {
    area.innerHTML = decks[activeDeck].topics.length === 0
      ? '<p class="placeholder">No daily questions yet — check back after Day 9.</p>'
      : '<p class="placeholder">Select a topic above to begin.</p>';
    return;
  }
  const topic = decks[activeDeck].topics.find(t => t.id === activeTopic);
  const q = topic.questions[activeQ];

  area.innerHTML = `
    <div class="card">
      <div class="q-meta">
        <span class="topic-tag">${topic.label}</span>
        <span class="q-num">${activeQ + 1} / ${topic.questions.length}</span>
      </div>
      <p class="question">${q.q.replace(/\n/g,'<br>')}</p>
      ${q.pre ? `<pre class="code-block">${q.pre}</pre>` : ''}
      <div id="opts-wrap"></div>
      <div id="exp-wrap"></div>
      <div id="nav-wrap" class="nav"></div>
    </div>`;

  const wrap = document.getElementById('opts-wrap');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const label = String.fromCharCode(65 + i);
    const text = q.code ? `<code>${opt}</code>` : opt;
    btn.innerHTML = `<strong>${label}.</strong>&nbsp; ${text}`;
    btn.addEventListener('click', () => handleAnswer(i));
    wrap.appendChild(btn);
  });
}

// ── Answer handling ─────────────────────────────────────────────────────────
function handleAnswer(chosen) {
  if (answered) return;
  answered = true;
  const topic = decks[activeDeck].topics.find(t => t.id === activeTopic);
  const q = topic.questions[activeQ];
  const st = totals[activeTopic];
  st.seen++;
  if (chosen === q.ans) st.correct++;

  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.add('locked');
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });

  document.getElementById('exp-wrap').innerHTML =
    `<div class="explanation">${q.exp}</div>`;

  const nav = document.getElementById('nav-wrap');
  if (activeQ < topic.questions.length - 1) {
    const nb = document.createElement('button');
    nb.className = 'nav-btn primary'; nb.textContent = 'Next question';
    nb.addEventListener('click', () => { activeQ++; answered = false; renderAll(); });
    nav.appendChild(nb);
  } else {
    const s = totals[activeTopic];
    const pct = Math.round((s.correct / s.total) * 100);
    nav.innerHTML = `<span class="score-pill">Topic score: <strong>${s.correct}/${s.total} (${pct}%)</strong></span>`;
    const rb = document.createElement('button');
    rb.className = 'nav-btn'; rb.textContent = 'Retry topic';
    rb.addEventListener('click', () => {
      totals[activeTopic] = {correct:0, seen:0, total:topic.questions.length};
      activeQ = 0; answered = false; renderAll();
    });
    nav.appendChild(rb);
    if (totalAnswered() === totalQuestions()) setTimeout(() => showScore(false), 600);
  }
  updateProgress();
  renderTopicBar();
}

// ── Score screen ─────────────────────────────────────────────────────────────
function showScore(partial) {
  const topics = decks[activeDeck].topics;
  const shown = partial ? topics.filter(t => totals[t.id].seen > 0) : topics;
  if (partial && shown.length === 0) return;

  const totalCorrect = shown.reduce((s,t) => s + totals[t.id].correct, 0);
  const totalSeen    = shown.reduce((s,t) => s + (partial ? totals[t.id].seen : totals[t.id].total), 0);
  const pct = totalSeen > 0 ? Math.round((totalCorrect / totalSeen) * 100) : 0;

  let passClass = '', verdict;
  if (partial) {
    verdict = `${totalSeen} of ${totalQuestions()} questions answered · ${pct}% correct so far`;
  } else {
    const passScore = decks[activeDeck].passScore;
    const pass = passScore !== null ? totalCorrect >= passScore : pct >= 80;
    passClass = pass ? 'pass' : 'fail';
    const passLabel = decks[activeDeck].passLabel || (pass ? 'Great work!' : 'Review and retry');
    verdict = `${pct}% · ${pass ? '✓ ' + passLabel : passLabel}`;
  }

  const topicBreakdown = shown.map(t => {
    const s = totals[t.id];
    const denom = partial ? s.seen : s.total;
    const p = denom > 0 ? Math.round((s.correct / denom) * 100) : 0;
    return `<div class="result-row">
      <div class="r-label">${t.label}</div>
      <div class="r-nums">${s.correct}/${denom}</div>
      <div style="font-size:12px;color:${p>=80?'#065f46':'#991b1b'}">${p}%</div>
    </div>`;
  }).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="card all-done">
      <div class="score-big ${passClass}">${totalCorrect}/${totalSeen}</div>
      <div class="score-label">${verdict}</div>
      <div class="result-grid" style="margin-top:1.5rem">${topicBreakdown}</div>
      <button class="nav-btn" style="margin-top:1rem" onclick="resetAll()">Start over</button>
    </div>`;
}

function resetAll() {
  initTotals();
  activeTopic = null; activeQ = 0; answered = false;
  document.getElementById('progress').style.width = '0%';
  renderAll();
}

function renderAll() { renderTopicBar(); renderQuestion(); }
renderAll();
</script>
</body>
</html>
