
<h2 class="sr-only">Day 11 targeted drill: 10 questions focused on weak spots — getItem vs element_at indexing, array_position, size vs cardinality, map_concat policy, inline vs explode, and from_json null behaviour.</h2>
<style>
.wrap{padding:1rem 0;}
.prog-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem;}
.prog-fill{height:4px;border-radius:2px;background:var(--color-text-warning);transition:width 0.3s;}
.section-pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:var(--border-radius-md);margin-bottom:10px;font-weight:500;}
.qcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;}
.qnum{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.qtxt{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.6;margin-bottom:14px;}
.cb{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;font-family:var(--font-mono);font-size:12px;line-height:1.7;color:var(--color-text-primary);white-space:pre;overflow-x:auto;margin-bottom:14px;}
.opt{padding:9px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin:5px 0;font-size:13px;cursor:pointer;color:var(--color-text-secondary);line-height:1.5;transition:border-color 0.1s;}
.opt:hover{background:var(--color-background-secondary);border-color:var(--color-border-secondary);}
.opt.correct{border-color:var(--color-border-success)!important;background:var(--color-background-success)!important;color:var(--color-text-success)!important;cursor:default;}
.opt.wrong{border-color:var(--color-border-danger)!important;background:var(--color-background-danger)!important;color:var(--color-text-danger)!important;cursor:default;}
.opt.reveal{border-color:var(--color-border-success)!important;background:var(--color-background-success)!important;color:var(--color-text-success)!important;opacity:0.55;cursor:default;}
.opt.done{cursor:default;}
.expl{display:none;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-secondary);margin-top:12px;line-height:1.6;}
.next-row{display:flex;align-items:center;gap:12px;margin-top:14px;}
.nbtn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);}
.nbtn:hover{background:var(--color-background-secondary);}
.final{text-align:center;padding:2rem 0;}
.big{font-size:48px;font-weight:500;color:var(--color-text-primary);}
.sub{font-size:14px;color:var(--color-text-secondary);margin-top:6px;}
.brow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;}
.btag{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);white-space:nowrap;}
.topic-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-warning);color:var(--color-text-warning);margin-bottom:10px;margin-left:6px;}
</style>

<div class="wrap">
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:10%;"></div></div>
  <div id="qbody"></div>
</div>

<script>
const Qs=[
  {
    topic:'getItem vs element_at',
    q:'You have Array["Laptop","Mouse","Keyboard"]. What does F.element_at(F.col("items"), 2) return?',
    opts:['Laptop — element_at is 0-indexed so 2 = third slot','Mouse — element_at is 1-indexed so 2 = second slot','Keyboard — element_at(col,2) means last two elements','null — index 2 is out of range for a 3-element array'],
    ans:1,
    ex:'element_at is 1-indexed. Position 1 = Laptop, 2 = Mouse, 3 = Keyboard. getItem(2) would return Keyboard (0-indexed: 0=Laptop, 1=Mouse, 2=Keyboard). This is the core trap — same number, different element depending on which function you use.'
  },
  {
    topic:'getItem vs element_at',
    q:'Which expression returns the LAST element of an array column "tags" regardless of its length?',
    opts:['F.col("tags").getItem(-1)','F.element_at(F.col("tags"), -1)','F.col("tags").getItem(F.size("tags"))','F.last(F.col("tags"))'],
    ans:1,
    ex:'element_at supports negative indexing: -1 = last element, -2 = second to last. getItem does not support negative indexes — getItem(-1) returns null. F.last() is a window/aggregate function, not an array accessor.'
  },
  {
    topic:'array_position',
    q:'F.array_position(F.col("tags"), "spark") returns 0. What does that mean?',
    opts:['"spark" is at index 0 — the first element','The array is empty','The value "spark" was not found in the array','The function failed silently and returned a default'],
    ans:2,
    ex:'array_position returns 0 specifically to signal "not found" — it is NOT a valid position. Valid positions start at 1 (1-indexed). So filtering array_position > 0 correctly finds rows containing the value. Never check isNull() — it will always be false since 0 is returned, not null.'
  },
  {
    topic:'array_position',
    q:'You want rows where "python" appears in the "tags" array. Which two approaches are both correct?',
    opts:['F.array_position(F.col("tags"),"python") > 0  AND  F.array_contains(F.col("tags"),"python")','F.array_position(F.col("tags"),"python").isNotNull()  AND  F.array_contains(F.col("tags"),"python")','F.array_position(F.col("tags"),"python") >= 0  AND  F.exists(F.col("tags"), lambda x: x=="python")','F.array_position(F.col("tags"),"python") > 0  AND  F.size(F.col("tags")) > 0'],
    ans:0,
    ex:'array_position > 0 correctly identifies found (positions start at 1, 0 means not found). array_contains returns boolean directly. Both work for equality checks. isNotNull() never matches since array_position returns 0 not null on miss. size > 0 just checks if the array is non-empty, not if "python" is in it.'
  },
  {
    topic:'size vs cardinality',
    q:'You filter with F.size(F.col("tags")) > 0. A row has tags = null. Does that row pass the filter?',
    opts:['Yes — null is treated as an empty array, size returns 0, 0 > 0 is false so it is excluded','No — size(null) = -1, and -1 > 0 is false, so null rows are correctly excluded','Yes — null > 0 evaluates to null which is truthy in Spark filters','No — the filter throws a NullPointerException on null arrays'],
    ans:1,
    ex:'size(null) = -1. So -1 > 0 is false — null rows are excluded. This is correct behaviour but the mechanism surprises people: it works not because Spark handles null gracefully, but because -1 happens to be less than 0. Use cardinality() if you want a cleaner 0 for nulls instead of -1.'
  },
  {
    topic:'size vs cardinality',
    q:'What is the difference between F.size() and F.cardinality() on a non-null array?',
    opts:['size counts distinct elements, cardinality counts all elements including duplicates','They are identical on non-null arrays — the difference only appears on null','size returns a Long, cardinality returns an Integer','size is for arrays only, cardinality works on arrays and maps'],
    ans:1,
    ex:'On non-null arrays they return exactly the same value — the element count. The only difference is null behaviour: size(null) = -1, cardinality(null) = 0. Both work on arrays and maps. The type returned is the same. Choose based on how you want to handle nulls.'
  },
  {
    topic:'map_concat',
    q:'What does Spark do by default when you call F.map_concat(map1, map2) and both maps share a key?',
    opts:['Right map wins — map2 value is kept, no exception','Left map wins — map1 value is kept, no exception','Throws DUPLICATED_MAP_KEY exception','Merges both values into an array under that key'],
    ans:2,
    ex:'Default behaviour (spark.sql.mapKeyDedupPolicy = EXCEPTION) is to throw DUPLICATED_MAP_KEY. To get right-wins behaviour, explicitly set spark.conf.set("spark.sql.mapKeyDedupPolicy", "LAST_WIN") before calling map_concat. Never assume silent merging — the default throws.'
  },
  {
    topic:'inline vs explode',
    q:'Column "events" is Array<Struct<ts:timestamp, type:string>>. After F.explode("events").alias("e"), what is the type of column "e"?',
    opts:['Two columns: ts and type are already unpacked','A single Struct<ts:timestamp,type:string> column — fields still nested','A string containing the JSON representation of the struct','A Map<String,String> with ts and type as keys'],
    ans:1,
    ex:'explode() opens the array — one row per element — but the element itself (a Struct) stays intact as a single column. You then need .select(F.col("e.ts"), F.col("e.type")) to unpack the fields. inline() does both steps: opens the array AND unpacks struct fields into separate columns in one call.'
  },
  {
    topic:'inline vs explode',
    q:'When can you use F.inline() and when must you use F.explode() instead?',
    opts:['inline works on any array type; explode only works on Array<String>','inline only works on Array<Struct>; explode works on any array type','inline and explode are interchangeable — inline is just faster','inline works on maps; explode works on arrays'],
    ans:1,
    ex:'inline() is specifically designed for Array<Struct> — it expands each struct into columns. If your array contains plain scalars (strings, ints) you must use explode(). explode() works on any array or map type. Think of inline as a specialised shortcut for the Array<Struct> → flat table pattern.'
  },
  {
    topic:'from_json',
    q:'After calling F.from_json(F.col("payload"), schema), you check the parsed column for bad rows. Which filter correctly catches ALL failed parses?',
    opts:['F.col("parsed") == ""','F.col("parsed").isNull()','F.col("parsed") == "null"','F.length(F.col("parsed")) == 0'],
    ans:1,
    ex:'from_json returns null (not an empty string, not the string "null") for malformed JSON. So isNull() is the correct check. The row itself is preserved — only the parsed column is null. This is why you always add .filter(F.col("parsed").isNotNull()) after from_json to route bad rows to a dead-letter table.'
  }
];

let cur=0,score=0,answered=false,results=[];

function renderQ(){
  document.getElementById('prog').style.width=((cur+1)/Qs.length*100)+'%';
  const q=Qs[cur];
  let html=`<div class="qcard">
    <div class="qnum">Drill question ${cur+1} of ${Qs.length} &nbsp;·&nbsp; score: ${score}</div>
    <span class="topic-pill">${q.topic}</span>
    <div class="qtxt">${q.q}</div>
    <div id="opts">`;
  q.opts.forEach((o,i)=>{html+=`<div class="opt" id="opt-${i}" onclick="pick(${i})">${o}</div>`;});
  html+=`</div><div class="expl" id="expl"></div>
    <div class="next-row" id="nrow" style="display:none;">
      ${cur<Qs.length-1
        ?`<button class="nbtn" onclick="nextQ()">Next &rarr;</button>`
        :`<button class="nbtn" onclick="showFinal()">See results &rarr;</button>`}
    </div>
  </div>`;
  document.getElementById('qbody').innerHTML=html;
  answered=false;
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=Qs[cur];
  const ok=i===q.ans;
  if(ok)score++;
  results.push({topic:q.topic,correct:ok,q:q.q.substring(0,55)+'...'});
  q.opts.forEach((_,j)=>{
    const el=document.getElementById(`opt-${j}`);
    el.classList.add('done');
    if(j===q.ans&&j===i) el.classList.add('correct');
    else if(j===i&&!ok) el.classList.add('wrong');
    else if(j===q.ans) el.classList.add('reveal');
  });
  const ex=document.getElementById('expl');
  ex.style.display='block';
  ex.textContent=q.ex;
  document.getElementById('nrow').style.display='flex';
}

function nextQ(){cur++;renderQ();}

function showFinal(){
  const pct=Math.round(score/Qs.length*100);
  const verdict=pct===100?'All weak spots locked in. Day 12.':pct>=80?'Strong improvement. Re-check the ones you missed.':pct>=60?'Getting there — retry the ones marked wrong.':'These need one more pass before Day 12.';

  const byTopic={};
  results.forEach(r=>{
    if(!byTopic[r.topic]){byTopic[r.topic]={c:0,t:0};}
    byTopic[r.topic].t++;
    if(r.correct)byTopic[r.topic].c++;
  });

  let trows='';
  Object.entries(byTopic).forEach(([t,v])=>{
    const ok=v.c===v.t;
    trows+=`<div class="brow">
      <span class="topic-pill" style="white-space:nowrap;">${t}</span>
      <span style="flex:1;color:var(--color-text-secondary);">${v.c} of ${v.t}</span>
      <span class="btag" style="background:var(--color-background-${ok?'success':'danger'});color:var(--color-text-${ok?'success':'danger'});">${Math.round(v.c/v.t*100)}%</span>
    </div>`;
  });

  const brows=results.map((r,i)=>`<div class="brow">
    <span style="font-size:12px;color:var(--color-text-tertiary);min-width:24px;">Q${i+1}</span>
    <span class="topic-pill" style="white-space:nowrap;">${r.topic}</span>
    <span style="flex:1;color:var(--color-text-secondary);font-size:12px;">${r.q}</span>
    <span class="btag" style="background:var(--color-background-${r.correct?'success':'danger'});color:var(--color-text-${r.correct?'success':'danger'});">${r.correct?'correct':'wrong'}</span>
  </div>`).join('');

  document.getElementById('qbody').innerHTML=`<div class="final">
    <div class="big">${score}/${Qs.length}</div>
    <div class="sub">${pct}% &middot; ${verdict}</div>
    <div style="margin:1.5rem 0 0.5rem;text-align:left;font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">By topic</div>
    ${trows}
    <div style="margin:1.5rem 0 0.5rem;text-align:left;font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">All questions</div>
    ${brows}
    <div style="display:flex;gap:8px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;">
      <button class="nbtn" onclick="cur=0;score=0;answered=false;results=[];renderQ()">Retry &rarr;</button>
      <button class="nbtn" onclick="sendPrompt('Teach me Day 12: Spark UDFs — Python UDFs, Pandas vectorized UDFs, SQL registration, Catalyst impact, when to avoid. Senior DE background.')">Day 12 &rarr;</button>
    </div>
  </div>`;
  document.getElementById('prog').style.width='100%';
}

renderQ();
</script>
