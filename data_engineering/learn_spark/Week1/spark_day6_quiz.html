<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark SQL Quiz — Day 6</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 1.5rem; max-width: 720px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .progress-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #1a56db; border-radius: 2px; transition: width 0.3s; }
  .meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
  .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: #E1F5EE; color: #085041; }
  .question { font-size: 15px; font-weight: 500; margin-bottom: 1rem; line-height: 1.55; }
  pre { background: #f5f5f5; border-radius: 6px; padding: 10px 14px; font-size: 12px; margin-bottom: 1rem; overflow-x: auto; line-height: 1.7; color: #222; white-space: pre-wrap; }
  .opt-btn { width: 100%; text-align: left; padding: 10px 14px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; font-family: inherit; line-height: 1.4; }
  .opt-btn:hover { background: #f5f5f5; }
  .opt-btn.correct { background: #ecfdf5 !important; border-color: #6ee7b7 !important; color: #065f46 !important; pointer-events: none; }
  .opt-btn.wrong { background: #fef2f2 !important; border-color: #fca5a5 !important; color: #991b1b !important; pointer-events: none; }
  .opt-btn.locked { pointer-events: none; }
  .exp { padding: 10px 14px; border-left: 3px solid #93b4f8; font-size: 13px; color: #444; margin-top: 1rem; line-height: 1.65; background: #f8faff; border-radius: 0 6px 6px 0; }
  .exp code { background: #e8f0fe; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .nav { margin-top: 1rem; display: flex; align-items: center; gap: 10px; }
  .nav-btn { padding: 7px 16px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 13px; font-family: inherit; }
  .nav-btn:hover { background: #f5f5f5; }
  .score-screen { text-align: center; padding: 2rem 0; }
  .score-big { font-size: 48px; font-weight: 600; color: #1a1a1a; }
  .score-label { font-size: 14px; color: #888; margin-top: 4px; margin-bottom: 1.5rem; }
  .score-breakdown { text-align: left; max-width: 460px; margin: 0 auto 1.5rem; }
  .score-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eee; gap: 12px; }
  .score-row:last-child { border-bottom: none; }
  .correct-dot { color: #065f46; font-weight: 600; flex-shrink: 0; }
  .wrong-dot { color: #991b1b; font-weight: 600; flex-shrink: 0; }
</style>
</head>
<body>
<h1>Spark SQL — certification essentials</h1>
<p class="subtitle">Day 6 · 12 questions · exam-relevant topics</p>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div id="quiz-area"></div>

<script>
const questions = [
  {
    tag: "Temp view scope",
    q: "You register a temp view and then your SparkSession ends. What happens to the view?",
    code: `df.createOrReplaceTempView("transactions")`,
    opts: [
      "It persists until manually dropped with spark.catalog.dropTempView()",
      "It is automatically saved to the metastore",
      "It disappears — temp views are session-scoped",
      "It becomes a global temp view automatically"
    ],
    ans: 2,
    exp: "Temp views are session-scoped — they live and die with the SparkSession. Global temp views (<code>createOrReplaceGlobalTempView</code>) survive across sessions in the same application and require the <code>global_temp.</code> prefix to query."
  },
  {
    tag: "Global temp view",
    q: "You created a global temp view called 'transactions'. Which query is correct?",
    opts: [
      "SELECT * FROM transactions",
      "SELECT * FROM global.transactions",
      "SELECT * FROM global_temp.transactions",
      "SELECT * FROM spark_catalog.transactions"
    ],
    ans: 2,
    exp: "Global temp views are stored in a special database called <code>global_temp</code>. You must use the fully qualified name <code>global_temp.view_name</code>. Forgetting this prefix is a common exam trap."
  },
  {
    tag: "SQL vs DataFrame API",
    q: "A colleague says spark.sql() is faster than the DataFrame API for aggregations. Is this true?",
    opts: [
      "Yes — SQL bypasses the DataFrame API overhead",
      "No — both compile to the same physical plan via Catalyst",
      "It depends on the number of partitions",
      "Yes — SQL uses a different execution engine"
    ],
    ans: 1,
    exp: "Both APIs go through Catalyst and produce identical physical plans. There is zero performance difference. Choose based on readability and team preference — SQL for reporting-style queries, DataFrame API for programmatic pipeline logic."
  },
  {
    tag: "Window functions",
    q: "What does this query return for each row?",
    code: `SELECT customer_id, amount,\n  SUM(amount) OVER (\n    PARTITION BY customer_id\n    ORDER BY txn_date\n  ) AS running_total\nFROM transactions`,
    opts: [
      "The total sum of amount for each customer across all rows",
      "A running cumulative sum per customer ordered by date",
      "The sum of amount for the current row only",
      "Throws an error — SUM requires GROUP BY"
    ],
    ans: 1,
    exp: "OVER with PARTITION BY + ORDER BY produces a running aggregate — each row gets the cumulative sum up to that row within its customer partition. Without ORDER BY it would return the total sum for the whole partition on every row."
  },
  {
    tag: "Window functions",
    q: "You want the single highest transaction per customer. Which is correct?",
    code: `-- Option A\nSELECT * FROM transactions\nQUALIFY RANK() OVER (PARTITION BY customer_id ORDER BY amount DESC) = 1\n\n-- Option B\nSELECT * FROM (\n  SELECT *, RANK() OVER (PARTITION BY customer_id ORDER BY amount DESC) AS rnk\n  FROM transactions\n) WHERE rnk = 1`,
    opts: [
      "Only Option A works — QUALIFY is required for window filtering",
      "Only Option B works — QUALIFY is not supported in Spark SQL",
      "Both work and produce the same result",
      "Neither works — use GROUP BY instead"
    ],
    ans: 2,
    exp: "Both are valid in Spark SQL. QUALIFY is cleaner — it filters on window function results directly without a subquery. Option B is the traditional SQL pattern that works everywhere. On the exam, know both exist and produce the same result."
  },
  {
    tag: "CASE WHEN null",
    q: "A transaction has a null country. What does this CASE WHEN return?",
    code: `CASE\n  WHEN country = 'NL' THEN 'Netherlands'\n  WHEN country = 'DE' THEN 'Germany'\nEND`,
    opts: [
      "Throws a NullPointerException",
      "Returns an empty string",
      "Returns null — no condition matches null",
      "Returns 'NL' as the default"
    ],
    ans: 2,
    exp: "Null never matches any equality condition in SQL — <code>null = 'NL'</code> evaluates to null, not false. With no ELSE clause, unmatched rows return null. Fix with: <code>ELSE 'Unknown'</code> or add <code>WHEN country IS NULL THEN 'Unknown'</code>."
  },
  {
    tag: "JOIN types",
    q: "You LEFT JOIN transactions to a customers table. A transaction has a customer_id that doesn't exist in customers. What happens to that row?",
    opts: [
      "The row is dropped from the result",
      "The row is kept — customer columns are null",
      "Spark throws a referential integrity error",
      "The row is moved to a separate error DataFrame"
    ],
    ans: 1,
    exp: "LEFT JOIN keeps all rows from the left table regardless of matches. Unmatched rows from the right table produce nulls in the right-side columns. This is critical in banking pipelines where orphaned transactions must not silently disappear."
  },
  {
    tag: "JOIN shuffle",
    q: "You join a 120 GB transactions table with a 500 KB currency lookup table. What should Spark do to avoid a full shuffle?",
    opts: [
      "Sort-merge join — sort both tables by join key",
      "Broadcast join — send the small table to every Executor",
      "Hash join — hash both tables into buckets",
      "Cross join — it's the only safe option"
    ],
    ans: 1,
    exp: "Broadcast join sends the small table (500 KB) to every Executor in full. Each Executor joins locally with no network shuffle of the large table. Spark does this automatically when the small table is below <code>spark.sql.autoBroadcastJoinThreshold</code> (default 10 MB). You can force it with <code>broadcast(df)</code>."
  },
  {
    tag: "spark.catalog",
    q: "Which spark.catalog method tells you whether a view currently exists in the session?",
    opts: [
      "spark.catalog.listViews()",
      "spark.catalog.tableExists(\"view_name\")",
      "spark.catalog.getView(\"view_name\")",
      "spark.catalog.describeTable(\"view_name\")"
    ],
    ans: 1,
    exp: "<code>spark.catalog.tableExists(\"view_name\")</code> returns True or False. <code>listViews()</code> returns a DataFrame of all views — you'd have to filter it. On the exam, know that <code>tableExists</code>, <code>listTables</code>, <code>dropTempView</code>, and <code>cacheTable</code> are the main catalog methods."
  },
  {
    tag: "SQL result as DataFrame",
    q: "You run spark.sql(...) and want to filter the result further using the DataFrame API. Is this possible?",
    code: `result = spark.sql("SELECT customer_id, SUM(amount) as total FROM txns GROUP BY customer_id")\nresult.filter(col("total") > 50000).write.parquet("s3://...")`,
    opts: [
      "No — spark.sql() returns a Row object, not a DataFrame",
      "Yes — spark.sql() always returns a DataFrame and you can chain any DataFrame operation",
      "Only if you re-register it as a temp view first",
      "Yes but only show() and collect() work on SQL results"
    ],
    ans: 1,
    exp: "<code>spark.sql()</code> always returns a standard DataFrame. You can chain any DataFrame operation on it — filter, join, withColumn, write. Mixing SQL and DataFrame API in the same job is completely normal and very common in production."
  },
  {
    tag: "NULL handling in aggregation",
    q: "Your amount column has 3 nulls out of 1000 rows. What does SUM(amount) return?",
    opts: [
      "null — any null in the column makes the whole sum null",
      "The sum of the 997 non-null rows — nulls are ignored",
      "0 — nulls are treated as zero",
      "Throws an error"
    ],
    ans: 1,
    exp: "Aggregate functions in Spark SQL ignore nulls by default — same behaviour as standard SQL. SUM, AVG, COUNT(*) vs COUNT(col) is worth knowing: <code>COUNT(*)</code> counts all rows including nulls, <code>COUNT(amount)</code> counts only non-null values."
  },
  {
    tag: "createOrReplaceTempView",
    q: "You call createOrReplaceTempView('transactions') twice with different DataFrames. What happens?",
    opts: [
      "Throws an error — view already exists",
      "Creates a second view called 'transactions_1'",
      "Silently replaces the first view with the second",
      "Both views exist — queries use the first one"
    ],
    ans: 2,
    exp: "The 'OrReplace' part is key — it silently overwrites the existing view with no error. This is useful in notebooks where you iterate on a DataFrame and re-register it. Use <code>createTempView()</code> (without OrReplace) if you want an error on duplicate names."
  }
];

let cur = 0;
const results = new Array(questions.length).fill(null);

function updateProgress() {
  document.getElementById('progress-bar').style.width = ((cur / questions.length) * 100) + '%';
}

function renderQuestion() {
  updateProgress();
  const q = questions[cur];
  let html =
    '<div class="meta"><span class="tag">' + q.tag + '</span><span style="font-size:13px;color:#888">' + (cur+1) + ' / ' + questions.length + '</span></div>' +
    '<p class="question">' + q.q + '</p>';
  if (q.code) html += '<pre>' + q.code + '</pre>';
  html += '<div id="opts-wrap"></div><div id="exp-wrap"></div><div id="nav-wrap" class="nav"></div>';
  document.getElementById('quiz-area').innerHTML = html;

  const wrap = document.getElementById('opts-wrap');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(i));
    wrap.appendChild(btn);
  });
}

function handleAnswer(chosen) {
  const q = questions[cur];
  results[cur] = chosen === q.ans;
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.classList.add('locked');
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  document.getElementById('exp-wrap').innerHTML = '<div class="exp">' + q.exp + '</div>';
  const nav = document.getElementById('nav-wrap');
  const nb = document.createElement('button');
  nb.className = 'nav-btn';
  if (cur < questions.length - 1) {
    nb.textContent = 'Next →';
    nb.addEventListener('click', () => { cur++; renderQuestion(); });
  } else {
    nb.textContent = 'See results →';
    nb.addEventListener('click', () => renderScore());
  }
  nav.appendChild(nb);
}

function renderScore() {
  document.getElementById('progress-bar').style.width = '100%';
  const correct = results.filter(Boolean).length;
  const verdict = correct >= 10 ? 'Exam-ready on this topic 🎯' : correct >= 7 ? 'Solid — review the misses' : 'Worth another pass before the exam';
  let breakdown = '';
  questions.forEach((q, i) => {
    breakdown += '<div class="score-row"><span>' + q.tag + '</span><span class="' + (results[i] ? 'correct-dot' : 'wrong-dot') + '">' + (results[i] ? '✓' : '✗') + '</span></div>';
  });
  document.getElementById('quiz-area').innerHTML =
    '<div class="score-screen">' +
    '<div class="score-big">' + correct + '/' + questions.length + '</div>' +
    '<div class="score-label">' + verdict + '</div>' +
    '<div class="score-breakdown">' + breakdown + '</div>' +
    '<button class="nav-btn" onclick="restart()">Retry all</button>' +
    '</div>';
}

function restart() {
  cur = 0;
  results.fill(null);
  updateProgress();
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
